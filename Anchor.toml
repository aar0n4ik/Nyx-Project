[toolchain]
anchor_version = "0.30.1"
[features]
resolution = true
skip-lint = false
[programs.devnet]
nyx_settlement = "Nyx1111111111111111111111111111111111111111"
[registry]
url = "https://api.apr.dev"
[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"
[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
# Deploy: solana config set --url devnet && solana airdrop 5 && anchor build && anchor keys sync && anchor build && anchor deploy
